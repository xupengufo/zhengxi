name: Daily Stock Screener

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'results.json'
      - 'README.md'
  schedule:
    - cron: '30 7 * * 1-5' # UTC 7:30 is Beijing Time 15:30 (Monday - Friday)
  workflow_dispatch:      # Support manual triggering

permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Stock Screener
        run: |
          python screener.py

      - name: Commit and Push results.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          git commit -m "data: update daily screening results [skip ci]" || exit 0
          git push
